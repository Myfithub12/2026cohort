<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Team Baseball Scorecard</title>
    <link rel="stylesheet" href="/css/batting.css">
    <link rel="stylesheet" href="/css/pitching.css">
    <link rel="stylesheet" href="/css/style.css">
    <script defer src="/js/main.js"></script>
    <script defer src="/js/batting.js"></script>
    <script defer src="/js/pitching.js"></script>
    <script src="mlbApi.js"></script>
<script src="scorecard.js"></script>
    <script defer src="/js/export.js"></script>
</head>
<body>
    <div class="scorecard-container">
        <div><h1><a href="index.html">Home</a></h1></div>

        <!-- HOME TEAM -->
        <div class="team-section">
            <h2>Home Team</h2>
            <input name="q" type="" title="Home Team" placeholder="Home Team" required>
<table>
    <tr>
        <div id="balls-home" class="dots"></div>
<div id="strikes-home" class="dots"></div>
    </tr>
    <tr>
        <th><button onclick="addBall('home')">Ball</button></th>
        <th><button onclick="addStrike('home')">Strike</button></th>
        <th><button onclick="addFoul('home')">Foul</button></th>
    </tr>
</table>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Position</th>
                        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                        <th>6</th><th>7</th><th>8</th><th>9</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="lineup-body-ht"></tbody>
            </table>
            <button onclick="addPlayer('lineup-body-ht')">Add Player</button>
<table id="pitchingTable">
    <tr>
        <th>Pitcher</th>
        <th>Walks</th>
        <th>Strikeouts</th>
        <th>Hits</th>
        <th>Innings Pitched</th>
        <th>Pitch Count</th>
        <th>WHIP</th>
    </tr>
</table>
        <hr>

        <!-- AWAY TEAM -->
        <div class="team-section">
            <h2>Visiting Team</h2>
            <input name="q" type="" title="Away Team" placeholder="Away Team" required>
<table>
    <tr>
<div id="balls-away" class="dots"></div>
<div id="strikes-away" class="dots"></div>
    </tr>
    <tr>
        <th><button onclick="addBall('away')">Ball</button></th>
        <th><button onclick="addStrike('away')">Strike</button></th>
        <th><button onclick="addFoul('away')">Foul</button></th>
    </tr>
</table>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Position</th>
                        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                        <th>6</th><th>7</th><th>8</th><th>9</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="lineup-body-at"></tbody>
            </table>
            <button onclick="addPlayer('lineup-body-at')">Add Player</button>
<table id="pitchingTable">
    <tr>
        <th>Pitcher</th>
        <th>Walks</th>
        <th>Strikeouts</th>
        <th>Hits</th>
        <th>Innings Pitched</th>
        <th>Pitch count</th>
        <th>WHIP</th>
    </tr>
</table>
<table>
    <tr>
        <td><button onclick="Scorecard.saveAndExport()">Export to Notepad</button></td>
    </tr>

        <td><button onclick="Scorecard.loadTeams()">Load MLB Teams</button></td>

    </tr>

    </tr>
    <tr>
        <td><button onclick="Scorecard.loadPlayerStats(12345)">Load Player Stats</button></td>
    </tr>
</table>
    </div>   -->
</body>
</html>
