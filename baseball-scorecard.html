<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Team Baseball Scorecard</title>
    <link rel="stylesheet" href="/CSS/batting.css">
    <link rel="stylesheet" href="/CSS/pitching.css">
    <link rel="stylesheet" href="/CSS/style.css">
    <script defer src="/script/batting.js"></script>
    <script defer src="/script/main.js"></script>
    <script defer src="/script/pitching.js"></script>
</head>
<body>
    <div class="scorecard-container">
        <h1>Scorecard</h1>

        <!-- HOME TEAM -->
        <div class="team-section">
            <h2>Home Team</h2>
            <input name="q" type="" title="Home Team" placeholder="Home Team" required ...>
<table>
    <tr>
        <td><div id="balls" class="dots"></div></td>
        <td><div id="strikes" class="dots"></div></td>
        <td></td>
    </tr>
    <tr>
        <th><button onclick="addBall()">Ball</button></th>
        <th><button onclick="addStrike()">Strike</button></th>
        <th><button onclick="addFoul()">Foul</button></th>
    </tr>
</table>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Position</th>
                        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                        <th>6</th><th>7</th><th>8</th><th>9</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="lineup-body-ht"></tbody>
            </table>
            <button onclick="addPlayer('lineup-body-ht')">Add Player</button>
<table id="pitchingTable">
    <tr>
        <th>Pitcher</th>
        <th>Walks</th>
        <th>Strikeouts</th>
        <th>Hits</th>
        <th>Innings Pitched</th>
        <th>Pitch Count</th>
        <th>WHIP</th>
    </tr>
</table>
<button id="sortWhip">Sort by WHIP</button>
        </div>
        <hr>

        <!-- AWAY TEAM -->
        <div class="team-section">
            <h2>Visiting Team</h2>
            <input name="q" type="" title="Away Team" placeholder="Away Team" required ...>
<table>
    <tr>
        <td><div id="balls" class="dots"></div></td>
        <td><div id="strikes" class="dots"></div></td>
        <td></td>
    </tr>
    <tr>
        <th><button onclick="addBall()">Ball</button></th>
        <th><button onclick="addStrike()">Strike</button></th>
        <th><button onclick="addFoul()">Foul</button></th>
    </tr>
</table>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Position</th>
                        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                        <th>6</th><th>7</th><th>8</th><th>9</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="lineup-body-at"></tbody>
            </table>
            <button onclick="addPlayer('lineup-body-at')">Add Player</button>
<table id="pitchingTable">
    <tr>
        <th>Pitcher</th>
        <th>Walks</th>
        <th>Strikeouts</th>
        <th>Hits</th>
        <th>Innings Pitched</th>
        <th>Pitch count</th>
        <th>WHIP</th>
    </tr>
</table>
<button id="sortWhip">Sort by WHIP</button>
        </div>

        <button onclick="exportToNotepad()">Export to Notepad</button>
    </div>
</body>
</html>


</html>
