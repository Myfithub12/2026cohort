<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Team Baseball Scorecard</title>
    <link rel="stylesheet" href="/CSS/batting.css">
    <link rel="stylesheet" href="/CSS/style.css">
    <script defer src="/script/main.js"></script>
    <script defer src="/script/batting.js"></script>
    <script defer src="/script/pitching.js"></script>
</head>
<body>
    <div class="scorecard-container">
        <h1>Scorecard</h1>

        <!-- HOME TEAM -->
        <div class="team-section">
            <h2>Home Team</h2>
            <table>
                <tr>
                    <th><button onclick="ball">Ball</button></th>
            <th><button onclick="strike">Strike</button></th>
            <th><button onclick="foul">Foul</button></th>
                    </th>
                </tr>
            </table>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Position</th>
                        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                        <th>6</th><th>7</th><th>8</th><th>9</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="lineup-body-ht"></tbody>
            </table>
            <button onclick="addPlayer('lineup-body-ht')">Add Home Player</button>
            <table>
                <tr>
                    <th>Pitcher</th>
                    <th>Walks</th>
                    <th>Strikeouts</th>
                    <th>Hits</th>
                    <th>Innings Pitched</th>
                    <th>WHIP</th>
                </tr>
            </table>
        </div>
        <hr>

        <!-- AWAY TEAM -->
        <div class="team-section">
            <h2>Visiting Team</h2>
            <table>
                <tr>
                    <th><button onclick="ball">Ball</button></th>
            <th><button onclick="strike">Strike</button></th>
            <th><button onclick="foul">Foul</button></th>
                    </th>
                </tr>
            </table>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Position</th>
                        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                        <th>6</th><th>7</th><th>8</th><th>9</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="lineup-body-at"></tbody>
            </table>
            <button onclick="addPlayer('lineup-body-at')">Add Away Player</button>
            <table>
                <tr>
                    <th>Pitcher</th>
                    <th>Walks</th>
                    <th>Strikeouts</th>
                    <th>Hits</th>
                    <th>Innings Pitched</th>
                    <th>WHIP</th>
                </tr>
            </table>
        </div>

        <button onclick="exportToNotepad()">Export to Notepad</button>
    </div>
</body>
</html>


</html>
