<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Team Baseball Scorecard</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <script defer src="/script/script.js"></script>
    <script defer src="/script/batting.js"></script>
    <script defer src="/script/pitching.js"></script>
</head>
<body>
    <div class="scorecard-container">
    <h1>Scorecard</h1>

    <div class="team-section">
        <h2>Home Team</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Pos</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
                    <th>Totals</th>
                </tr>
            </thead>
            <tbody id="lineup-body-ht">
                </tbody>
        </table>
    </div>

    <hr> <div class="team-section">
        <h2>Visiting Team</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Pos</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
                    <th>Totals</th>
                </tr>
            </thead>
            <tbody id="lineup-body-at">
                </tbody>
        </table>
    </div>

    <button onclick="exportToExcel()">Export to Excel</button>
</div>
</body>
</html>
